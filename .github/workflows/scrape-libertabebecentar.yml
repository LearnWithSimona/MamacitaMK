name: Scrape libertabebecentar.mk

on:
  schedule:
    # Every 6 hours, offset 30 min from babycenter so the two don't run together.
    - cron: "30 */6 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-libertabebecentar
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape and upsert to Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: firebase/functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node lib/index.js libertabebecentar
